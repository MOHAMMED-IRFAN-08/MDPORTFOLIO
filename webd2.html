<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body{
                background-color: yellow;
            }
            nav{
                padding: 10px;
            }
            button{
    
                cursor:crosshair;
                background: rgb(177, 211, 222);
                margin-left: 50%;
                margin-top: 10%;
                border: 2px solid blue;
            }
            img{
                position:absolute;
                top: 50%;
                width: 150px;
                animation:moveOutIn 10s linear infinite;
            }
            img:nth-child(2){
                top: 20%;
                animation-delay: 1.3s;
            }
            @keyframes
            moveOutIn{
              from{
                left:10%;
              }
              to{
                left:90%;
              }
            }
            button:hover{
                box-shadow: 4px 4px 4px 4px red;
            }
        </style>
        
    </head>
